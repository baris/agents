# Pre-commit configuration template
# Copy to project root as .pre-commit-config.yaml
# Install: pip install pre-commit && pre-commit install
#
# Remove sections not applicable to your project's language(s).

repos:
  # ==========================================================================
  # UNIVERSAL (all projects)
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  # Secrets detection (CRITICAL - keep this enabled)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks

  # ==========================================================================
  # PYTHON
  # ==========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.1
    hooks:
      # Linting
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Formatting
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        additional_dependencies: []  # Add your type stubs here if needed

  # ==========================================================================
  # JAVASCRIPT / TYPESCRIPT
  # ==========================================================================
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: \.[jt]sx?$
        types: [file]
        additional_dependencies:
          - eslint@8.56.0
          - eslint-config-prettier@9.1.0
          - '@typescript-eslint/eslint-plugin@6.19.0'
          - '@typescript-eslint/parser@6.19.0'

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, css, markdown]

  # TypeScript type checking (requires tsconfig.json in project)
  # Note: This runs tsc --noEmit, which can be slow for large projects
  # - repo: local
  #   hooks:
  #     - id: tsc
  #       name: TypeScript type check
  #       entry: npx tsc --noEmit
  #       language: system
  #       files: \.tsx?$
  #       pass_filenames: false

  # ==========================================================================
  # GO
  # ==========================================================================
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.55.2
    hooks:
      - id: golangci-lint

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
      - id: go-mod-tidy

  # ==========================================================================
  # COMMIT MESSAGE FORMAT
  # ==========================================================================
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.1.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, bugfix, docs, style, refactor, perf, test, chore]
